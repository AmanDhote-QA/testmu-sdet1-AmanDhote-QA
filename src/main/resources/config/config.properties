# Browser Configuration
browser=auto
headless=false
privateMode=false

# Application URLs
baseUrl=https://the-internet.herokuapp.com
apiBaseUrl=https://dummyjson.com

# Timeout Configuration (seconds)
implicitWait=10
explicitWait=20
pageLoadTimeout=30

# Environment
environment=qa

# AI / LLM Configuration
ai.enabled=true
ai.model=gpt-4o-mini
ai.maxTokens=2000
ai.temperature=0.3

# Retry Configuration
retry.maxCount=1

# Screenshot Configuration
screenshot.onFailure=true
screenshot.outputDir=reports/screenshots

# Report Configuration
report.outputDir=reports
report.llmOutputDir=reports/llm-output
report.testOutputDir=reports/test-output